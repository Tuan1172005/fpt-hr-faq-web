<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FPT HR FAQ</title>
  <style>
    :root{
      --card:#121a33; --border:#22305c; --text:#e7eaf3;
      --muted:rgba(231,234,243,.75);
      --fpt-orange:#ff6a00; --fpt-blue:#0a66c2;
    }
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto;margin:0;
      background:linear-gradient(180deg,#070b18 0%, #0b1020 100%);color:var(--text)}
    .wrap{max-width:920px;margin:0 auto;padding:18px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800}
    .logo{width:34px;height:34px;border-radius:10px;
      background:conic-gradient(from 180deg, var(--fpt-orange), #ffb000, #00c2ff, var(--fpt-blue), var(--fpt-orange));
      box-shadow:0 8px 18px rgba(255,106,0,.15);}
    .badge{font-size:12px;color:#111;background:#ffd9bf;border-radius:999px;padding:5px 10px;font-weight:800}
    .card{background:rgba(18,26,51,.92);border:1px solid var(--border);border-radius:16px;padding:14px}
    .hint{color:var(--muted);font-size:12px;line-height:1.4}
    textarea{width:100%;min-height:84px;border-radius:14px;border:1px solid var(--border);
      background:#0f1730;color:var(--text);padding:12px;font-size:15px;outline:none}
    textarea:focus{border-color:rgba(255,106,0,.7);box-shadow:0 0 0 3px rgba(255,106,0,.15)}
    .row{display:flex;gap:10px;align-items:center;margin-top:10px;flex-wrap:wrap}
    button{border:0;border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer}
    #askBtn{background:linear-gradient(90deg,var(--fpt-orange),#ff9800);color:#111}
    .status{color:var(--muted);font-size:12px}
    .sectionTitle{margin:14px 0 6px 0;font-size:14px}
    pre{white-space:pre-wrap;word-wrap:break-word;margin:0;background:#0f1730;border:1px solid var(--border);
      border-radius:14px;padding:12px}
    .pill{display:inline-block;padding:3px 8px;border:1px solid var(--border);
      border-radius:999px;margin-right:8px;font-size:12px;color:var(--muted)}
    .alt{padding:8px 0;border-bottom:1px dashed rgba(34,48,92,.6);color:var(--muted);font-size:13px}
    .alt:last-child{border-bottom:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <div>FPT HR FAQ</div>
          <div class="hint">Tra cứu nhanh (demo). Không có câu trả lời phù hợp thì tự ghi nhận vào Google Sheet.</div>
        </div>
      </div>
      <div class="badge">FREE • No GPT</div>
    </div>

    <div class="card">
      <textarea id="q" placeholder="Nhập câu hỏi... (VD: em muốn WFH thì sao?)"></textarea>
      <div class="row">
        <button id="askBtn">Tra cứu</button>
        <span id="st" class="status"></span>
      </div>

      <div class="sectionTitle">Trả lời</div>
      <div id="meta" class="hint"></div>
      <pre id="a"></pre>

      <div class="sectionTitle">Gợi ý kết quả gần nhất</div>
      <div id="alts"></div>
    </div>
  </div>

  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
