<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FPT GST HR Portal</title>
  <style>
    :root {
      /* Bảng màu chuẩn FPT */
      --fpt-orange: #F37021;
      --fpt-orange-hover: #D95C15;
      --fpt-blue: #14284B;
      --fpt-green: #48A727;
      
      /* Màu sắc UI */
      --bg-color: #F4F6F9;
      --card-bg: #FFFFFF;
      --text-main: #333333;
      --text-muted: #6B7280;
      --border-color: #E5E7EB;
    }
    
    body {
      font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
    }
    
    .wrap {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    
    /* Topbar & Branding */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    /* CSS FPT Logo 3 vạch */
    .logo-wrap {
      display: flex;
      gap: 4px;
    }
    .logo-part {
      width: 12px;
      height: 28px;
      border-radius: 2px;
    }
    .logo-1 { background-color: var(--fpt-orange); }
    .logo-2 { background-color: var(--fpt-green); }
    .logo-3 { background-color: var(--fpt-blue); }

    .brand-text-container {
      display: flex;
      flex-direction: column;
    }
    .brand-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--fpt-blue);
      margin-bottom: 2px;
    }
    .brand-desc {
      color: var(--text-muted);
      font-size: 13px;
    }
    
    .badge {
      font-size: 12px;
      color: var(--fpt-blue);
      background-color: #E8F0FE;
      border: 1px solid #D2E3FC;
      border-radius: 6px;
      padding: 6px 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    /* Card Container */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }
    
    /* Inputs & Buttons */
    .input-group {
      margin-bottom: 16px;
    }
    textarea {
      width: 100%;
      min-height: 90px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background: #FAFAFA;
      color: var(--text-main);
      padding: 16px;
      font-size: 15px;
      outline: none;
      resize: vertical;
      box-sizing: border-box;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus {
      border-color: var(--fpt-orange);
      background: #FFFFFF;
      box-shadow: 0 0 0 3px rgba(243, 112, 33, 0.15);
    }
    
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    button {
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    #askBtn {
      background-color: var(--fpt-orange);
      color: #FFFFFF;
    }
    #askBtn:hover {
      background-color: var(--fpt-orange-hover);
    }
    .status {
      color: var(--text-muted);
      font-size: 13px;
    }
    
    /* Sections & Results */
    .sectionTitle {
      margin: 12px 0 12px 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--fpt-blue);
      border-bottom: 2px solid #F3F4F6;
      padding-bottom: 8px;
    }
    .hint {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 0 0 24px 0;
      background: #F9FAFB;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 16px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text-main);
      line-height: 1.6;
    }
    
    /* Pills & Alternatives */
    .pill {
      display: inline-block;
      padding: 4px 10px;
      background-color: #F3F4F6;
      border: 1px solid var(--border-color);
      border-radius: 999px;
      margin-right: 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .alt {
      padding: 12px 0;
      border-bottom: 1px dashed var(--border-color);
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .alt:hover {
      color: var(--fpt-orange);
    }
    .alt:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <!-- Logo CSS đại diện 3 màu chuẩn FPT -->
        <div class="logo-wrap" aria-hidden="true">
          <div class="logo-part logo-1"></div>
          <div class="logo-part logo-2"></div>
          <div class="logo-part logo-3"></div>
        </div>
        <div class="brand-text-container">
          <div class="brand-title">FPT GST HR Portal</div>
          <div class="brand-desc">Hệ thống hỗ trợ và giải đáp thắc mắc Nhân sự</div>
        </div>
      </div>
      <div class="badge">Nội bộ GST</div>
    </div>

    <div class="card">
      <div class="input-group">
        <textarea id="q" placeholder="Nhập câu hỏi của bạn... (VD: Quy trình đăng ký làm việc từ xa (WFH) như thế nào?)"></textarea>
      </div>
      
      <div class="row">
        <button id="askBtn">Tra cứu thông tin</button>
        <span id="st" class="status"></span>
      </div>

      <div class="sectionTitle">Kết quả tra cứu</div>
      <div id="meta" class="hint"></div>
      <pre id="a"></pre>

      <div class="sectionTitle">Các câu hỏi liên quan</div>
      <div id="alts"></div>
    </div>
  </div>

  <!-- Scripts gốc được giữ nguyên để không làm ảnh hưởng tính năng -->
  <script src="./config.js"></script>
  <script src="./app.js"></script>
</body>
</html>
